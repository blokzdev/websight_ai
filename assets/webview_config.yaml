# Welcome to the WebSight Configuration File!
# This file is the single source of truth that defines your entire application.
# To get started, you can rename this file to `webview_config.yaml` and build the app.
# It is pre-configured to create a demo app for the official Flutter website.

# -----------------------------------------------------------------------------
# [CORE APP IDENTITY]
# -----------------------------------------------------------------------------
app:
  # The name of your application as it will appear in the UI.
  name: "WebSight Demo"

  # The primary domain your WebView should treat as first-party.
  # CRITICAL: This MUST match your website's host. Do not include 'https://' or paths.
  host: "flutter.dev"

  # The full initial URL to load when the app starts.
  home_url: "https://flutter.dev/"

  # Android applicationId (reverse-DNS, lowercase).
  # When set, `dart run tool/configure.dart` writes this into
  # android/app/build.gradle.kts (applicationId + namespace) and the manifest
  # provider authority. Leave commented to keep the demo default.
  # application_id: "com.yourcompany.yourapp"

  # AdMob console App ID for this Android app.
  # NOTE: this is the App ID (with a "~"), NOT the Ad Unit IDs (which contain
  # a "/"). Unit IDs go under `ads.placements.*.ad_unit_id` below.
  # When set, `dart run tool/configure.dart` writes it into the
  # AndroidManifest.xml `com.google.android.gms.ads.APPLICATION_ID` meta-data.
  # admob_app_id: "ca-app-pub-XXXXXXXXXX~YYYYYYYYYY"

  # Optional pubspec version override. When set,
  # `dart run tool/configure.dart` writes it into pubspec.yaml `version:`.
  # version: "1.0.0+1"

# -----------------------------------------------------------------------------
# [FLUTTER UI/UX LAYER]
# This section controls the native Flutter shell around your web content.
# -----------------------------------------------------------------------------
flutter_ui:
  theme:
    # The overall brightness of the app's native UI.
    # Options: "light", "dark", "system"
    brightness: "dark"

    # The primary seed color for the entire app.
    # All other colors will be algorithmically generated from this color.
    primary: "#0175C2"

    # (Optional) Override the main background color.
    # surface: "#0B0B0C"

    # (Optional) Override the color of text and icons on the main background.
    # on_surface: "#F5F5F5"

    # Whether to use the modern Material 3 design system. Highly recommended.
    use_material3: true

    # (Optional) The name of a font from fonts.google.com to apply to all native UI.
    font_family: "Inter"

  # ---------------------------------------------------------------------------
  # [SYSTEM UI / IMMERSIVE FEEL]
  # The point of WebSight is to make a wrapped site feel like a native app.
  # Edge-to-edge is the default; the WebView paints under transparent system
  # bars. Set `mode: "default"` to fall back to the standard "shell with
  # opaque chrome" look (e.g. for kiosk or admin tools that want explicit
  # bars).
  # ---------------------------------------------------------------------------
  system_ui:
    # How the OS status / nav bars are handled.
    #   default          - Flutter default; opaque bars push content.
    #   edge_to_edge     - Window draws under transparent bars (RECOMMENDED).
    #   immersive_sticky - Bars hidden, swipe to reveal (media-heavy sites).
    #   leanback         - Bars hidden, no reveal (kiosk / TV).
    mode: "edge_to_edge"

    status_bar:
      visible: true             # ignored under immersive_sticky / leanback
      transparent: true         # let the WebView paint behind the bar
      icon_brightness: "auto"   # auto | light | dark; auto follows theme

    navigation_bar:
      visible: true
      transparent: true
      icon_brightness: "auto"

    # Inject `viewport-fit=cover` + a `--websight-safe-*` CSS variable shim
    # so the wrapped site can pad its own header/footer with
    # `env(safe-area-inset-top)` / `var(--websight-safe-top)`. Disable if
    # the site already declares viewport-fit and you don't want extra meta.
    inject_safe_area_css: true

    # Defensive auto-padding on `<body>` so sites that DON'T natively
    # respect `env(safe-area-inset-*)` don't have their content (logos,
    # sticky headers in normal flow, footers) slide under the transparent
    # status / nav bars. Wrapped in an `@supports` block so older engines
    # ignore it. Disable when the wrapped site handles insets itself, or
    # tighten `auto_pad_edges` if only specific edges overlap.
    auto_pad_body: true
    # Edges to pad: any of `top`, `bottom`, `left`, `right`. Defaults to
    # the two that overlap content in portrait. `left`/`right` matter only
    # in landscape on side-notched devices.
    auto_pad_edges: ["top", "bottom"]

  layout:
    # The main navigation style for the app.
    # Options: "drawer", "bottom_tabs", "top_tabs", "none"
    # NOTE: Set "none" (and `appbar.visible: false`) for the most native
    # feel — the wrapped site provides its own UI; WebSight is invisible.
    scaffold: "drawer"

    appbar:
      # Whether the AppBar is visible by default. Can be overridden per route.
      visible: true
      # A list of icon buttons to display on the right side of the AppBar.
      actions:
        - id: "refresh"
          icon: "Icons.refresh"
          action: "webview.reload"
        - id: "settings"
          icon: "Icons.settings_outlined"
          action: "navigate:/native/settings"

    # Whether to show a Floating Action Button (FAB).
    visible: false

# -----------------------------------------------------------------------------
# [ROUTES & NAVIGATION]
# Defines all the screens (both web and native) in your app.
# -----------------------------------------------------------------------------
routes:
  - path: "/web/home"
    kind: "webview"
    title: "Flutter Home"
    label: "Home"
    icon: "Icons.home_outlined"
    url: "https://flutter.dev/"
    appbar_visible: true
    pull_to_refresh: true

  - path: "/native/watchlist"
    kind: "native"
    title: "Watchlist"
    label: "Watchlist"
    icon: "Icons.star_border"
    appbar_visible: true
    pull_to_refresh: false
    
  - path: "/native/portfolio"
    kind: "native"
    title: "Portfolio"
    label: "Portfolio"
    icon: "Icons.account_balance_wallet_outlined"
    appbar_visible: true
    pull_to_refresh: false
    
  - path: "/native/alerts"
    kind: "native"
    title: "Alerts"
    label: "Alerts"
    icon: "Icons.notifications_none"
    appbar_visible: true
    pull_to_refresh: false

  - path: "/native/settings"
    kind: "native"
    title: "Settings"
    label: "Settings"
    icon: "Icons.settings_outlined"
    appbar_visible: true
    pull_to_refresh: false

  # AI routes — first-PR scaffolding stubs (AI_SPEC.md §7).
  # Each renders ConfigurableNativeScreen's labeled placeholder until the
  # PR ladder lights it up (PR 14 wires real onboarding + audit log;
  # later PRs wire AI Settings).
  - path: "/native/ai-settings"
    kind: "native"
    title: "AI Settings"
    icon: "Icons.smart_toy_outlined"
    appbar_visible: true
    pull_to_refresh: false

  - path: "/native/onboarding"
    kind: "native"
    title: "Welcome"
    icon: "Icons.waving_hand_outlined"
    appbar_visible: true
    pull_to_refresh: false

  - path: "/native/audit-log"
    kind: "native"
    title: "Audit Log"
    icon: "Icons.receipt_long_outlined"
    appbar_visible: true
    pull_to_refresh: false

# -----------------------------------------------------------------------------
# [WEBVIEW ENGINE]
# -----------------------------------------------------------------------------
navigation:
  # External domains that, if navigated to, will open in an external browser.
  external_allowlist:
    - "google.com"
    - "github.com"
    - "dart.dev"

  deep_links:
    enable: true
    hosts:
      - "flutter.dev"

webview_settings:
  javascript_enabled: true
  dom_storage_enabled: true

  # Multi-window popup support. Many OAuth providers (Google / Microsoft /
  # Twitter / Facebook "Sign in with…") open the auth flow via
  # `window.open()`. webview_flutter_android does not expose a public
  # onCreateWindow API, so WebSight intercepts `window.open` from the
  # wrapped page and routes the URL into a Flutter modal popup WebView.
  multi_window:
    enabled: true                # disable to suppress popups entirely
    close_on_parent_host: true   # auto-close when popup hits a parent host
    reload_parent_on_close: true # reload underlying page after popup closes

  # HTML5 `<video>` fullscreen handler (the fullscreen icon in a video
  # player calls WebChromeClient.onShowCustomView). Without this, the
  # button does nothing.
  fullscreen_video:
    enabled: true
    lock_landscape: false        # let the video / page decide orientation

# -----------------------------------------------------------------------------
# [JAVASCRIPT BRIDGE]
# -----------------------------------------------------------------------------
js_bridge:
  enabled: true
  name: "WebSightBridge"
  secure_origin_only: true

  # Outbound methods (JS calling native).
  methods:
    - "scanBarcode(callbackFn)"
    - "share(text)"
    - "getDeviceInfo()"
    - "downloadBlob(url, filename?)"
    - "openExternal(url)"
    - "registerHttpDownload(url, opts?)"

  # Inbound events (JS dispatching to native).
  inbound_events:
    - event: "openNative"
      args: ["route"]
      action: "navigate:{route}"
    - event: "toast"
      args: ["message"]
      action: "ui.toast:{message}"

# -----------------------------------------------------------------------------
# [SECURITY]
# -----------------------------------------------------------------------------
security:
  # List of hosts the WebView is allowed to navigate to internally.
  restrict_to_hosts:
    - "flutter.dev"

# -----------------------------------------------------------------------------
# [WEBVIEW PERMISSIONS]
# Allowlist for prompts the wrapped site can trigger via standard browser
# APIs (`getUserMedia`, `navigator.geolocation`). The runtime OS-level
# permission is requested via permission_handler at the moment the site
# asks — so the user sees a single Android prompt, not a separate
# WebView dialog.
# -----------------------------------------------------------------------------
permissions:
  webview:
    allow_camera: true
    allow_microphone: true
    allow_geolocation: true
    allow_protected_media: false    # EME / DRM resource id; opt-in only
    retain_geolocation: false       # remember the user's geo grant per origin

# -----------------------------------------------------------------------------
# [MONETIZATION & COMPLIANCE]
# -----------------------------------------------------------------------------
ads:
  enabled: true
  consent_gate_with_ump: true
  
  placements:
    # A global fallback banner ad.
    global_banner:
      screen_scope: "all"
      format: "banner_adaptive"
      position: "bottom"
      # This is Google's example Ad Unit ID for testing.
      ad_unit_id: "ca-app-pub-3940256099942544/6300978111"

    # Route-specific ad placements.
    route_placements:
      home_collapsible_banner:
        screen_scope: "route"
        route: "/web/home"
        format: "banner_collapsible"
        position: "bottom"
        ad_unit_id: "ca-app-pub-3940256099942544/6300978111"

# -----------------------------------------------------------------------------
# [APP LIFECYCLE & POLISH]
# -----------------------------------------------------------------------------
updates:
  # In-app update mode. Options: "none", "flexible", "immediate"
  in_app_updates: "flexible"

analytics_crash:
  analytics: true
  crashlytics: true

notifications:
  post_notifications_permission: true
  fcm_enabled: false

behavior_overrides:
  back_button:
    confirm_before_exit: true

# -----------------------------------------------------------------------------
# [LEGAL / DISCLAIMERS]
# Recommended when wrapping a third-party site you don't own. Acceptance is
# keyed on a hash of the body text, so editing the body re-prompts on next
# launch.
# -----------------------------------------------------------------------------
legal:
  unofficial_disclaimer:
    enabled: false
    title: "Unofficial app"
    body: |
      This app is an unofficial WebView wrapper.
      It is not affiliated with or endorsed by the operator of the embedded site.
      Content is provided as-is; the publisher of this app is not responsible
      for the accuracy or availability of that content.

      By tapping "I understand", you accept these terms and use the app for
      personal, development, or educational purposes.
    accept_label: "I understand"
    decline_label: "Exit"
    require_accept: true

# -----------------------------------------------------------------------------
# [SPLASH SCREEN]
# In-Flutter splash shown while the first WebView page loads. For the native
# pre-Flutter splash (the first frame after process start, before the engine
# draws), see the README section on `flutter_native_splash`.
# -----------------------------------------------------------------------------
splash:
  enabled: false                # set true to display the splash overlay
  timeout_ms: 1500              # how long the splash stays on screen
  fade_out_ms: 300              # cross-fade duration once the splash exits
  # image_asset: "assets/splash/logo.png"   # any Flutter asset path
  # background_color: "#0B0B0C"             # falls back to theme surface
  # tagline: "Loading your dashboard…"

# -----------------------------------------------------------------------------
# [DOWNLOADS] (consumed by the JS download interceptor)
# -----------------------------------------------------------------------------
downloads:
  enabled: true
  use_android_download_manager: true
  support_blob_urls: true

# -----------------------------------------------------------------------------
# [AI] — WebSight AI agent configuration. Scaffolded by the first PR per
# AI_SPEC.md §7; no runtime code consumes most of this yet. The locked
# schema lives in docs/AI_DESIGN.md §10. Parsed by lib/config/ai_config.dart
# via the _typed<T> hand-rolled pattern (no build_runner).
#
# Default state: `enabled: false`. Existing WebSight functionality is
# unchanged when this block is present but disabled.
# -----------------------------------------------------------------------------
ai:
  enabled: false

  # Build-time preset. Mismatched downstream config raises AiConfigError
  # at YAML load time (e.g. co_pilot + user_configurable.home_url: true).
  preset: "co_pilot"             # co_pilot | browser

  # Per-user runtime overrides exposed in AI Settings. Browser-preset only
  # flags (home_url, trusted_domains) must stay false under co_pilot.
  user_configurable:
    home_url: false
    trusted_domains: false
    autonomy: true
    require_validation: true

  # Curated starter sites for browser preset (ignored under co_pilot).
  presets: []

  # BYOK onboarding scope and provider metadata.
  byok:
    required: true
    providers: ["anthropic", "openai", "google"]
    default_provider: "anthropic"
    default_model:
      anthropic: "claude-opus-4-7"
      openai: "gpt-5"
      google: "gemini-2.5-pro"
    embeddings_provider: "voyage"   # voyage | openai (Anthropic ships no embeddings)

  # Three-layer host enforcement; the agent's `navigate` tool gate is
  # additive on top of the existing NavigationDelegate backstop.
  navigation_policy:
    home_only: false
    trusted_domains: []
    untrusted_action: "prompt"       # prompt | block | allow
    log_all_navigations: true

  # Two-axis autonomy (AI_DESIGN.md §9.2). Sensitive fills (password,
  # card, ssn, pin) ALWAYS confirm — locked in code, not configurable.
  autonomy:
    action_defaults:
      page_interactions: "auto"
      cross_host_navigation: "confirm"
      form_submits: "confirm"
      native_actions: "confirm"
    per_host_overrides: {}

  # Floating dock launcher (rendered in AppShell stack, PR 7+).
  dock:
    enabled: true
    initial_position: "bottom_right"
    hideable: true
    show_on_first_launch: true

  # Token-budget cost discipline (AI_DESIGN.md §11).
  budgets:
    soft_token_limit_per_task: 50000
    hard_token_limit_per_task: 100000
    soft_step_threshold: 30
    monthly_token_warning: 5000000

  # Page-reading strategy (AI_DESIGN.md §4).
  page_reader:
    dom_digest: true
    screenshot_on_request: true
    set_of_marks: true
    diff_subsequent_turns: true
    perceptual_hash_dedup: true

  # Memory architecture (AI_DESIGN.md §6). MIRIX-derived taxonomy.
  memory:
    core_enabled: true
    episodic_enabled: true
    semantic_enabled: true
    resource_enabled: false           # v1.x
    procedural_enabled: false         # v1.x
    audit_log_enabled: true
    embeddings_enabled: true
    auto_extract_enabled: true        # auto-extract to pending_review queue
    router:
      strategy: "heuristic"
      escalate_on_ambiguity: true     # cheap LLM fallback on low-confidence
    retention:
      episodic_days: 0                # 0 = keep forever
      max_episodic_rows: 100000

  # Privacy posture. Onboarding asks about crash reporting per
  # AI_DESIGN.md §9.1 footnote.
  privacy:
    crash_reporting: "ask_at_onboarding"  # on | off | ask_at_onboarding
    anonymous_usage_telemetry: false      # not shipping in v1

  # Defense-in-depth pipeline (AI_THREAT_MODEL.md §4, AI_DESIGN.md §4.5–4.9).
  # Sanitization, spotlighting, and flow tagging are always-on; only the
  # classifier / paraphrase / self-reflect knobs are user-configurable.
  security:
    sanitization_enabled: true            # always-on emergency switch
    spotlighting_enabled: true            # always-on emergency switch
    classifier_mode: "edge_preferred"     # edge_preferred | cloud_only | local_heuristic | off
    paraphrase:
      enabled: false                      # off by default; opt-in per host
      high_risk_hosts: []
      on_classifier_flag: true            # auto-enable when classifier flags content
      execution: "edge_preferred"
      cloud_fallback_model:
        provider: "anthropic"
        model: "claude-haiku-4-5"
    self_reflect_enabled: true            # fires only on destructive actions
    self_reflect_execution: "edge_preferred"

  # Edge defense routing (EDGE_DEFENSE.md §4). Tier A devices run defense
  # ops on-device via Gemini Nano / AICore; Tier B/C fall back to cloud.
  edge_defense:
    mode: "auto"                          # auto | edge_only | cloud_only
    download_strategy: "lazy"             # lazy | proactive
    fallback_on_quota: true               # cloud fallback when AICore daily cap hit
    show_quota_indicator: "near_exhaustion"  # always | near_exhaustion | never

  # Billing / inference path (AI_DESIGN.md §1.4). v1 only honors `byok`;
  # `managed` (v1.5) and `local` (v2) are architecturally accepted but
  # rejected at parse time with a clear "not yet supported" error.
  billing:
    mode: "byok"                          # byok | managed | local
    byok:
      providers:
        anthropic:
          recommended: true
          security_posture: "Adversarial training in place; recommended."
          supported_models: ["claude-opus-4-7", "claude-sonnet-4-6", "claude-haiku-4-5"]
          security_notes: "Constitutional AI training documented. Tool-use robustness research published."
        google:
          recommended: true
          security_posture: "Adversarial training documented (Gemini 2.5+)."
          supported_models: ["gemini-2.5-pro", "gemini-2.5-flash"]
          warn_below_model: "gemini-2.5-pro"
          security_notes: "Adversarial fine-tuning on indirect prompt injection from Gemini 2.5 onward (Shi et al. 2025)."
        openai:
          recommended: true
          security_posture: "Adversarial training in place; less publicly documented."
          supported_models: ["gpt-5", "gpt-5-mini"]
          security_notes: "Adversarial training acknowledged; specific IPI-focused work less publicly detailed."
    managed:                              # v1.5; ignored in v1
      proxy_endpoint: ""
      free_trial_credits: 100
    local:                                # v2; ignored in v1
      require_tier: "A+"

  # Task-class router (AI_DESIGN.md §1.5). Three UI presets;
  # per-class overrides for power users.
  router:
    preset: "balanced"                    # cost_conscious | balanced | quality_first
    show_routing_badge: true              # per-turn tier × model × cost in chat panel
    classifier:
      mode: "heuristic"                   # heuristic (v1) | llm_assisted (v1.x)
    overrides:                            # null = use preset default
      routine: null
      reasoning: null
      heavy: null
    cross_provider_overrides_allowed: true
    tier_mapping:
      anthropic:
        routine: "claude-haiku-4-5"
        reasoning: "claude-sonnet-4-6"
        heavy: "claude-opus-4-7"
      openai:
        routine: "gpt-5-nano"
        reasoning: "gpt-5-mini"
        heavy: "gpt-5"
      google:
        routine: "gemini-flash"
        reasoning: "gemini-2.5-pro"
        heavy: "gemini-2.5-pro-thinking"
