name: Feature request
description: Suggest a feature for WebSight AI (a new YAML key, bridge method, agent tool, defense, or shell capability).
title: "[feat] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        WebSight AI's scope is the agentic-browser path on top of the
        WebSight substrate: declarative Android-WebView shell + AI
        agent loop + defense pipeline + memory + task-class router.
        Features outside that scope (iOS, general Flutter framework,
        non-browser AI assistants) are deferred per the PR ladder
        in AI_SPEC.md §7.

        For broad questions ("How would I do X?", "Should I...?"),
        please use [Discussions](https://github.com/blokzdev/websight_ai/discussions)
        instead of an issue.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: |
        Describe the user-facing problem, not the proposed
        implementation. "Users can't X" is more useful than "Add Y".
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach (optional)
      description: |
        If you have a concrete proposal — a new YAML key, a bridge
        method signature, a config schema change — sketch it here.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: |
        What workarounds exist today? Why are they insufficient?

  - type: dropdown
    id: scope
    attributes:
      label: Does this require a breaking config change?
      options:
        - "No — additive only"
        - "Yes — would break existing webview_config.yaml files"
        - "Unsure"
    validations:
      required: true
