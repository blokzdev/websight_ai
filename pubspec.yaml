name: websight
description: Declarative Android WebView app shell driven by a single webview_config.yaml.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  camera: ^0.11.3
  cupertino_icons: ^1.0.9
  device_info_plus: ^12.4.0
  firebase_analytics: ^12.3.0
  firebase_core: ^4.2.0
  firebase_crashlytics: ^5.2.0
  firebase_messaging: ^16.2.2
  flutter:
    sdk: flutter
  go_router: ^17.2.3
  google_fonts: ^8.1.0
  google_mlkit_barcode_scanning: ^0.14.2
  google_mobile_ads: ^8.0.0
  image_picker: ^1.2.2
  in_app_purchase: ^3.2.0
  in_app_review: ^2.0.9
  in_app_update: ^4.2.2
  json_annotation: ^4.8.1
  path_provider: ^2.1.2
  permission_handler: ^12.0.1
  provider: ^6.1.1
  share_plus: ^12.0.2
  shared_preferences: ^2.3.0
  url_launcher: ^6.2.5
  webview_flutter: ^4.13.1
  webview_flutter_android: ^4.12.0
  yaml: ^3.1.2

dev_dependencies:
  build_runner: ^2.4.8
  change_app_package_name: ^1.5.0
  flutter_launcher_icons: ^0.14.1
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.4
  flutter_test:
    sdk: flutter
  json_serializable: ^6.13.1
  mason_logger: ^0.3.0       # used by tool/init.dart for the rich TUI mode

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/splash/
    - assets/website/css/
    - assets/offline/

# Configures the native pre-Flutter splash (the very first frame, before the
# Dart VM starts). To regenerate after editing this block, run:
#   dart run flutter_native_splash:create
# This rewrites Android drawables so the next install picks them up. The
# in-Flutter splash overlay is configured separately in
# `assets/webview_config.yaml` -> `splash:`.
flutter_native_splash:
  color: "#0B0B0C"
  # image: assets/splash/logo.png   # uncomment + drop a file at this path
  android_12:
    color: "#0B0B0C"
    # image: assets/splash/logo.png
  fullscreen: false
  android: true
  ios: false
  web: false

# Generates Android launcher icons (legacy + adaptive + monochrome) from a
# single source PNG. To regenerate after replacing assets/launcher/icon.png:
#   dart run flutter_launcher_icons
flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  # image_path: "assets/launcher/icon.png"          # 1024x1024 PNG
  # adaptive_icon_background: "#0B0B0C"             # solid color or asset path
  # adaptive_icon_foreground: "assets/launcher/icon_foreground.png"
  # adaptive_icon_monochrome: "assets/launcher/icon_monochrome.png"  # API 33+ themed icons
  remove_alpha_ios: false
  min_sdk_android: 24
